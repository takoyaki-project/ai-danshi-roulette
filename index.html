<style>
  :root {
    --pink: #ff5fa2;
    --pink-soft: #ffd9ec;
    --lavender: #e6d6ff;
    --ink: #453a63;
    --ink-soft: #6c6188;
    --glass: rgba(255, 255, 255, 0.55);
    --glass-edge: rgba(255, 255, 255, 0.85);
    --gold: #ffb52e;
    --char: #ff5fa2; /* 結果キャラの色で上書きされる */
    --psize: min(55vw, 200px); /* 立ち絵の直径 */
    --radius: 24px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Zen Kaku Gothic New", sans-serif;
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    background:
      radial-gradient(circle at 20% 15%, color-mix(in srgb, var(--char) 35%, transparent), transparent 60%),
      linear-gradient(160deg, var(--pink-soft) 0%, var(--lavender) 60%, #d6e4ff 100%);

    transition: background 0.8s ease;
    overflow-x: hidden;
  }

  /* ---- ヘッダー ---- */
  header { text-align: center; margin-bottom: 18px; }

  .app-title {
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 900;
    font-size: 2rem;
    line-height: 1.2;
    background: linear-gradient(120deg, #ff5fa2 10%, #a06bff 55%, #5a8dff 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 2px 6px rgba(255, 95, 162, 0.35));
  }

  .app-sub {
    font-size: 0.82rem;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
    margin-top: 4px;
    font-weight: 500;
  }

  /* ---- 結果カード（ガラス） ---- */
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--glass);
    border: 1.5px solid var(--glass-edge);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 12px 36px rgba(120, 80, 180, 0.18);
    padding: 20px 18px 22px;
    text-align: center;
    position: relative;
    transition: box-shadow 0.5s ease;
  }

  .card.rainbow {
    border: 2px solid transparent;
    background:
      linear-gradient(var(--glass), var(--glass)) padding-box,
      linear-gradient(120deg, #ff5fa2, #ffb52e, #6fe3b0, #5a8dff, #a06bff) border-box;
    box-shadow: 0 12px 44px rgba(160, 107, 255, 0.4);
  }

  .card.legend {
    box-shadow: 0 0 0 4px rgba(255, 181, 46, 0.35), 0 14px 48px rgba(255, 181, 46, 0.45);
  }

  .rare-label {
    min-height: 1.5em;
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 900;
    font-size: 1.05rem;
  }

  .rare-label.shine {
    background: linear-gradient(120deg, #ff5fa2, #ffb52e, #6fe3b0, #5a8dff, #a06bff, #ff5fa2);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 2.5s linear infinite;
  }
  @keyframes shine {
    to { background-position: 300% 0; }
  }

  /* ---- 立ち絵 ---- */
  .portrait-ring {
    width: var(--psize);
    height: var(--psize);
    margin: 6px auto 14px;
    border-radius: 50%;
    padding: 5px;
    background: linear-gradient(140deg, var(--char), color-mix(in srgb, var(--char) 40%, #ffffff));
    box-shadow: 0 6px 20px color-mix(in srgb, var(--char) 45%, transparent);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  .portrait-ring.pop { animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0.4; }
    70% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }

  .portrait {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .portrait .fallback {
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 900;
    font-size: 3rem;
    color: var(--char);
  }

  /* ---- 待機中：6人のミニアイコンがくるくる ---- */
  .idle-center {
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--pink);
  }

  .orbit {
    position: absolute;
    inset: 0;
    animation: orbit 16s linear infinite;
  }
  @keyframes orbit { to { transform: rotate(360deg); } }

  .mini {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 34px;
    height: 34px;
    margin: -17px 0 0 -17px;
    border-radius: 50%;
    border: 2px solid #fff;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(120, 80, 180, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.9rem;
  }
  .mini img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

  /* ---- ネームプレート ---- */
  .name-tag {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    background: var(--char);
    color: #fff;
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    padding: 7px 22px;
    border-radius: 999px;
    box-shadow: 0 4px 12px color-mix(in srgb, var(--char) 50%, transparent);
    transition: background 0.4s ease;
    margin-bottom: 12px;
  }

  .name-tag small {
    font-size: 0.72rem;
    font-weight: 700;
    opacity: 0.95;
    letter-spacing: 0.05em;
  }

  /* ---- メッセージボックス（会話画面風）＋ハンコ ---- */
  .msg-wrap { position: relative; }

  .message-box {
    background: rgba(255, 255, 255, 0.78);
    border: 1.5px solid var(--glass-edge);
    border-radius: 18px;
    padding: 16px 16px 18px;
    min-height: 112px;
    text-align: left;
    font-size: 1.05rem;
    line-height: 1.75;
    font-weight: 500;
    position: relative;
    box-shadow: inset 0 1px 4px rgba(120, 80, 180, 0.08);
  }

  .message-box::after {
    content: "▼";
    position: absolute;
    right: 14px;
    bottom: 8px;
    font-size: 0.65rem;
    color: var(--char);
    animation: bounce 1.2s infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .message-box.done::after { opacity: 0.8; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(3px); }
  }

  .stamp {
    position: absolute;
    top: -14px;
    right: -4px;
    background: linear-gradient(120deg, var(--pink), #a06bff);
    color: #fff;
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 900;
    font-size: 0.9rem;
    padding: 6px 14px;
    border-radius: 999px;
    box-shadow: 0 4px 12px rgba(160, 107, 255, 0.4);
    transform: rotate(-8deg);
    z-index: 2;
  }
  .card.legend .stamp { background: linear-gradient(120deg, var(--gold), #ff8c42); }

  .stamp.stamped { animation: hanko 0.4s cubic-bezier(0.34, 1.3, 0.64, 1); }
  @keyframes hanko {
    0% { transform: scale(2.2) rotate(-8deg); opacity: 0; }
    60% { transform: scale(0.92) rotate(-8deg); opacity: 1; }
    100% { transform: scale(1) rotate(-8deg); }
  }

  /* ---- けーちゃんの心の声（チップ型吹き出し） ---- */
  .bubble-row {
    display: flex;
    justify-content: center;
    margin-top: 16px;
    min-height: 2.6em;
  }

  .bubble {
    display: inline-block;
    background: #fff;
    color: var(--ink);
    font-size: 0.95rem;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 16px;
    box-shadow: 0 3px 10px rgba(120, 80, 180, 0.18);
    position: relative;
  }
  .bubble:empty { display: none; }
  .bubble::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 24px;
    width: 12px;
    height: 12px;
    background: #fff;
    transform: rotate(45deg);
  }

  /* ---- ボタン ---- */
  .controls {
    width: 100%;
    max-width: 400px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .spin-btn {
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    color: #fff;
    background: linear-gradient(120deg, #ff5fa2, #a06bff);
    border: none;
    border-radius: 999px;
    padding: 16px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(255, 95, 162, 0.45);
    transition: transform 0.15s ease, opacity 0.2s;
    letter-spacing: 0.04em;
  }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.55; cursor: default; }

  .share-btn {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.7);
    border: 1.5px solid var(--glass-edge);
    border-radius: 999px;
    padding: 12px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .share-btn.show { opacity: 1; pointer-events: auto; }

  button:focus-visible, a:focus-visible {
    outline: 3px solid var(--pink);
    outline-offset: 3px;
  }

  /* ---- キラキラ ---- */
  .sparkle {
    position: fixed;
    top: -5vh;
    font-size: 1.3rem;
    animation: fall 2s linear forwards;
    pointer-events: none;
    z-index: 10;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(300deg); opacity: 0.2; }
  }

  /* ---- フッター ---- */
  footer {
    margin-top: auto;
    padding-top: 32px;
    text-align: center;
    font-size: 0.72rem;
    color: var(--ink-soft);
    line-height: 1.9;
  }
  footer a { color: var(--pink); font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    .sparkle, .message-box::after, .orbit { animation: none; }
    .portrait-ring.pop, .stamp.stamped { animation: none; }
    body, .card, .portrait-ring, .name-tag { transition: none; }
  }
</style>
</head>

  lines: [
    "今日の相棒は——全員。AI男子、総出演です。君の開発、6人で全力サポートします！",
    "「「「今日も一緒に作ろう！」」」6人の声が揃いました。伝説の開発日和です。",
    "全員集合。今日の君には、それだけの価値があるということです。（by Crow）"
  ]
};

/* けーちゃんの心の声（吹き出し） */
const reactions = [
  "💭 天を仰ぐ案件",
  "💭 今日も顔がいい",
  "💭 解釈一致すぎる",
  "💭 語彙力がデプロイできない",
  "💭 供給助かる",
  "💭 スクショ案件です",
  "💭 沼りました（納期は守る）",
  "💭 推し駆動開発、始動"
];
const ssrReactions = [
  "💭 尊死。でもコミットはする",
  "💭 今日のための人生だった",
  "💭 幸福度が振り切れる",
  "💭 無理、好き、リリースする"
];

const stamps = ["💖優勝", "💎尊い", "🎀ビジュ優勝", "✨神回", "🫶供給感謝", "💜沼注意", "🚀進捗出る", "🔧バグも愛"];
const ssrStamps = ["🌈神引き", "👑伝説", "💫限界突破"];

/* ========================================================= */
const nameTagEl = document.getElementById("nameTag");
const messageBoxEl = document.getElementById("messageBox");
const bubbleEl = document.getElementById("bubble");
const stampEl = document.getElementById("stamp");
const rareLabelEl = document.getElementById("rareLabel");
const portraitEl = document.getElementById("portrait");
const portraitRing = document.getElementById("portraitRing");
const card = document.getElementById("card");
const button = document.getElementById("spinBtn");
const shareBtn = document.getElementById("shareBtn");

const APP_URL = "https://takoyaki-project.github.io/ai-danshi-roulette/";
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* 画像プリロード（初回スピンのチラつき防止） */
[...characters, legend].forEach(c => { new Image().src = c.img; });

function pickRandom(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function setCharColor(color) {
  document.documentElement.style.setProperty("--char", color);
}

/* ---- 待機画面：6人のミニアイコンがくるくる回る ---- */
function showIdleOrbit() {
  portraitEl.innerHTML = "";

  const center = document.createElement("span");
  center.className = "idle-center";
  center.textContent = "？";
  portraitEl.appendChild(center);

  const orbit = document.createElement("div");
  orbit.className = "orbit";
  characters.forEach((c, i) => {
    const mini = document.createElement("div");
    mini.className = "mini";
    mini.style.background = c.color;
    mini.style.transform =
      "rotate(" + (i * 60) + "deg) translateY(calc(var(--psize) / -2 + 26px)) rotate(" + (-i * 60) + "deg)";
    const img = document.createElement("img");
    img.src = c.img;
    img.alt = "";
    img.onerror = () => { img.remove(); mini.textContent = "💗"; };
    mini.appendChild(img);
    orbit.appendChild(mini);
  });
  portraitEl.appendChild(orbit);
}
showIdleOrbit();

function showPortrait(chara) {
  portraitEl.innerHTML = "";
  const img = document.createElement("img");
  img.src = chara.img;
  img.alt = chara.name;
  img.onerror = () => {
    /* 画像が未配置でも動くように、頭文字プレースホルダーを表示 */
    portraitEl.innerHTML = "";
    const fb = document.createElement("span");
    fb.className = "fallback";
    fb.textContent = chara.name.charAt(0);
    portraitEl.appendChild(fb);
  };
  portraitEl.appendChild(img);
}

function setNameTag(chara) {
  nameTagEl.innerHTML = "";
  nameTagEl.appendChild(document.createTextNode(chara.name));
  const small = document.createElement("small");
  small.textContent = chara.tag;
  nameTagEl.appendChild(small);
}

/* 演出をリスタートさせるための小技 */
function replayAnimation(el, className) {
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
}

/* タイプライター表示 */
let typeTimer = null;
function typeMessage(text) {
  clearInterval(typeTimer);
  messageBoxEl.classList.remove("done");
  if (reduceMotion) {
    messageBoxEl.textContent = text;
    messageBoxEl.classList.add("done");
    return;
  }
  messageBoxEl.textContent = "";
  let i = 0;
  typeTimer = setInterval(() => {
    messageBoxEl.textContent += text.charAt(i);
    i++;
    if (i >= text.length) {
      clearInterval(typeTimer);
      messageBoxEl.classList.add("done");
    }
  }, 45);
}

function makeSparkles(count = 24, emoji = "✨") {
  if (reduceMotion) return;
  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.textContent = emoji;
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.animationDelay = Math.random() * 0.6 + "s";
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 2400);
  }
}

function updateShare(chara, mode) {
  let text;
  if (mode === "legend") {
    text = "👑伝説モード発生！AI男子が全員お迎えに来てくれました！ #AI男子ルーレット";
  } else if (mode === "rainbow") {
    text = "🌈神引き！今日の推しは " + chara.name + "（" + chara.tag + "）、レアセリフが出ました！ #AI男子ルーレット";
  } else {
    text = "今日の推しは " + chara.name + "（" + chara.tag + "）でした💗 #AI男子ルーレット";
  }
  shareBtn.href = "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) + "&url=" + encodeURIComponent(APP_URL);
  shareBtn.classList.add("show");
}

button.addEventListener("click", () => {
  button.disabled = true;
  card.classList.remove("rainbow", "legend");
  rareLabelEl.textContent = "";
  rareLabelEl.classList.remove("shine");
  stampEl.hidden = true;
  bubbleEl.textContent = "💭 ドキドキ待機中";
  shareBtn.classList.remove("show");
  clearInterval(typeTimer);

  /* レア判定はスピン前に確定：伝説1% / 虹色4% */
  const randomNum = Math.random();
  let mode = "normal";
  if (randomNum < 0.01) mode = "legend";
  else if (randomNum < 0.05) mode = "rainbow";

  let count = 0;
  const tick = reduceMotion ? 1 : 75;
  const maxCount = reduceMotion ? 1 : 24;

  const interval = setInterval(() => {
    const temp = pickRandom(characters);
    setCharColor(temp.color);
    setNameTag(temp);
    showPortrait(temp);
    messageBoxEl.textContent = "推しをお迎え中……";

    count++;
    if (count >= maxCount) {
      clearInterval(interval);

      let result;
      if (mode === "legend") {
        result = legend;
        typeMessage(pickRandom(legend.lines));
        card.classList.add("rainbow", "legend");
        stampEl.textContent = "👑伝説";
        bubbleEl.textContent = pickRandom(ssrReactions);
        rareLabelEl.textContent = "👑 伝説モード発生！！";
        rareLabelEl.classList.add("shine");
        makeSparkles(40, "🌈");
      } else {
        result = pickRandom(characters);
        if (mode === "rainbow") {
          typeMessage(pickRandom(result.rareLines));
          card.classList.add("rainbow");
          stampEl.textContent = pickRandom(ssrStamps);
          bubbleEl.textContent = pickRandom(ssrReactions);
          rareLabelEl.textContent = "🌈 神引き！レアセリフ！";
          rareLabelEl.classList.add("shine");
          makeSparkles(28, "✨");
        } else {
          typeMessage(pickRandom(result.lines));
          stampEl.textContent = pickRandom(stamps);
          bubbleEl.textContent = pickRandom(reactions);
        }
      }

      setCharColor(result.color);
      setNameTag(result);
      showPortrait(result);
      replayAnimation(portraitRing, "pop");
      stampEl.hidden = false;
      replayAnimation(stampEl, "stamped");
      updateShare(result, mode);

      button.textContent = "💗 もう一回お迎えする";
      button.disabled = false;
    }
  }, tick);
});
</script>
</body>
</html>
